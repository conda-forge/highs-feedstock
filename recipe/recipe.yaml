schema_version: 1

context:
  name: HiGHS
  version: "1.13.1"

recipe:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/ERGO-Code/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: d491448e585dbf08cd8945ca5dcbbe3b784d73b9c68eea4e7456274619d56164

build:
  number: 0

outputs:
  - package:
      name: highs
    build:
      script:
        - if: unix
          then: build.sh
        - if: win
          then: build.bat
    requirements:
      run_exports:
        - ${{ pin_subpackage('highs', upper_bound='x.x') }}
      build:
        - ${{ compiler('cxx') }}
        - cmake >=3.15
        - if: win
          then: ninja
          else: make
        - ${{ stdlib("c") }}
    tests:
      - files:
          source:
            - check/instances/afiro.mps
        script:
          - if: unix
            then: test -f ${PREFIX}/include/highs/Highs.h
          - if: linux
            then: test -f ${PREFIX}/lib/libhighs.so
          - if: win
            then: if not exist %LIBRARY_PREFIX%\include\highs\Highs.h (exit 1)
          - highs check/instances/afiro.mps

  - package:
      name: highs-hipo
    build:
      script:
        - if: unix
          then: build_hipo.sh
        - if: win
          then: build_hipo.bat
    requirements:
      host:
        - if: blas_impl == "openblas"
          then: openblas
        - if: blas_impl == "mkl"
          then: mkl
        - if: blas_impl == "mkl"
          then: mkl-devel
        - if: blas_impl == "mkl"
          then: mkl-include
      run:
        - if: blas_impl == "openblas"
          then: openblas
        - if: blas_impl == "mkl"
          then: mkl
      run_exports:
        - ${{ pin_subpackage('highs-hipo', upper_bound='x.x') }}
      build:
        - ${{ compiler('cxx') }}
        - cmake >=3.15
        - if: win
          then: ninja
          else: make
        - ${{ stdlib("c") }}
      # run:
      #   - ${{ pin_subpackage('highs', exact=True) }}
    tests:
      - script:
          - highs --version

about:
  summary: HiGHS is a high performance serial and parallel solver for large scale sparse linear optimization problems
  description: |
    HiGHS is a high performance serial and parallel solver for large scale
    sparse linear optimization problems
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/ERGO-Code/HiGHS
  repository: https://github.com/ERGO-Code/HiGHS
  documentation: https://highs.dev

extra:
  recipe-maintainers:
    - galabovaa
    - adament
    - julian-belina
    - DerThorsten